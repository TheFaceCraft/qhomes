name: Deploy Backend to qhomesbackend.tfcmockup.com

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '!backend/node_modules/**'
      - '!backend/vendor/**'
      - '!backend/storage/**'
      - '!backend/.env'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy Laravel Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Prepare deployment files
        run: |
          echo "Preparing backend files for deployment..."
          cd backend
          echo "Current directory contents:"
          ls -la
          
      - name: Deploy to FTP Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.BACKEND_FTP_SERVER }}
          username: ${{ secrets.BACKEND_FTP_USERNAME }}
          password: ${{ secrets.BACKEND_FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/app/public/**
            **/.DS_Store
            **/tests/**
            **/phpunit.xml
            **/composer.lock
            **/package-lock.json
            **/*.md
            **/test_*.php
            **/check_*.php
            **/fix_*.php
            **/update_*.php
            **/assign_*.php
            **/resolve_*.php
            **/create_sample_*.php
            **/*.bat
            **/*.phar
            **/*.backup
